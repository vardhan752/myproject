<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Recognition</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=1400&q=80') no-repeat center center/cover;
height:100vh;
}

.overlay{
background:rgba(0,0,0,0.75);
height:100%;
}

nav{
display:flex;
justify-content:space-between;
padding:25px 60px;
align-items:center;
}

.logo{
color:#f7a31b;
font-size:40px;
font-weight:bold;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav ul li a{
color:white;
text-decoration:none;
font-weight:bold;
}

.btn{
background:#f7a31b;
padding:12px 24px;
border-radius:5px;
}

.main{
padding:80px;
color:white;
}

h1{
font-size:60px;
}

input{
margin-top:25px;
padding:12px;
}

button{
padding:12px 20px;
background:#f7a31b;
border:none;
color:white;
cursor:pointer;
}

.card{
margin-top:30px;
background:white;
color:black;
padding:20px;
width:320px;
border-radius:10px;
display:none;
}

img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}
</style>
</head>
<body>

<div class="overlay">

<nav>
<div class="logo">🍴 Food Calorie Recognition</div>

<ul>
<li><a href="afterlogin.html">HOME</a></li>
<li><a href="#" onclick="document.getElementById('file').click()">UPLOAD</a></li>
<li><a href="index.html" class="btn">LOGOUT</a></li>
</ul>
</nav>

<div class="main">

<h1>Taste Inspired <br> by Technology</h1>

<input type="file" id="file" onchange="showFood()" hidden>

<div class="card" id="result">
<img id="preview">

<h3 id="foodname"></h3>
<p id="calories"></p>
</div>

</div>

</div>

<script>
function showFood(){

let file=document.getElementById("file").files[0];

if(file){

let imgURL=URL.createObjectURL(file);
document.getElementById("preview").src=imgURL;

let name=file.name.toLowerCase();

let food="Unknown Food";
let cal="Calories Not Found";

if(name.includes("idli")){
food="Idli";
cal="Calories: 58 per piece";
}
else if(name.includes("dosa")){
food="Dosa";
cal="Calories: 168";
}
else if(name.includes("pizza")){
food="Pizza";
cal="Calories: 266";
}
else if(name.includes("burger")){
food="Burger";
cal="Calories: 295";
}
else if(name.includes("rice")){
food="Rice";
cal="Calories: 130";
}
else if(name.includes("apple")){
food="Apple";
cal="Calories: 52";
}

document.getElementById("foodname").innerHTML="Food Name: "+food;
document.getElementById("calories").innerHTML=cal;
document.getElementById("result").style.display="block";

}

}
</script>

</body>
</html>
